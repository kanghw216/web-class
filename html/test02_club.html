<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua 동아리 신입 부원 모집</title>
    <link rel="stylesheet" href="../css/test01_club.css">
</head>
<body>
    <h1 class="front_text">Lua동아리 모집 신청서</h1>
    <p class="mainText">가입 희망 신청서</p>
    <hr>
    <form>
        <fieldset>
            <legend>기본 정보</legend>
            <label>이름 <input type="text"></label><br>
            <label>학번 <input type="text"></label>
        </fieldset>

        <fieldset>
            <legend>지원 정보</legend>
            <input type="checkbox" name="activity" value="vpn"><label>vpn 개발</label>
            <input type="checkbox" name="activity" value="roblox studio"><label>로블록스 스튜디오 기초</label>
            <input type="checkbox" name="activity" value="web develop"><label>웹 개발</label>
            <input type="checkbox" name="activity" value="server develop"><label>서버 개발</label><br>
            <label>지원 동기 <textarea cols="20" rows="3"></textarea></label><br>
        </fieldset>

        <fieldset>
            <legend>자기소개</legend>
            <label>주로 사용하는 언어<br>
                <input type="radio" name="Lang" value="java"><labe>java</labe></label>
                <input type="radio" name="Lang" value="python"><label>python</label>
                <input type="radio" name="Lang" value="C"><label>C</label>
                <input type="radio" name="Lang" value="Lua"><label>Lua</label><br>
            </label>
            <label>자신의 특기 <input type="text"></label><br>
            <label>장단점 <textarea cols="20" rows="3"></textarea></label><br>
        </fieldset>
        <button type="submit">신청하기</button>
        <button type="reset">취소하기</button>
    </form>
</body>
</html>
