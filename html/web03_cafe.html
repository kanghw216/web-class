<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멸치주먹밥</title>
    <link rel="stylesheet" href="../css/web02_cafe.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang&family=Nanum+Myeongjo&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="text_shadow gowun-batang-regular"><i class="fi fi-br-mug-hot"></i>이상적인 카페</h1>
    </p>
    <hr>
    <!-- 메뉴 정보 -->
    <h2 class="text_de">주문서 작성</h2>

    <form>
        <fieldset>
            <legend>주문자 정보</legend>
            <label>주문자 이름 <input type="text" id="name" size="10" maxlength="10" c required></label><br>
            <label for="tel">연락처 </label><input id="tel" type="tel" value="010-"><br>
            <label>이메일 <input type="email" placeholder="@포함"></label>
        </fieldset>

        <fieldset>
            <legend>수령 방법 및 시간</legend>
            <label>수령 방식 
                <input type="radio" name="delivery" value="pick"><label>픽업</label>
                <input type="radio" name="delivery" value="deli" checked><label>배달</label>
            </label><br>
            <label>픽업 날짜 
                <input type="date">
            </label><br>
            <label>픽업 시간 
                <input type="time">
            </label>
        </fieldset>

        <fieldset>
            <legend>메뉴 및 상세 옵션</legend>
            <label>주문 메뉴 
                <select size="1" multiple>
                    <option value="ameri" selected>아메리카노</option>
                    <option value="caflat">카페라떼</option>
                    <option value="yuza">유자차</option>
                    <option value="matchalat">말차라떼</option>
                    <option value="jaeyuk">제육볶음</option>
                    <option value="anything">아무거나</option>
                </select>
            </label><br>
            <label>HOT/COLD 선택 
                <input type="radio" name="HOTCOLD" value="hot"><label>HOT</label>
                <input type="radio" name="HOTCOLD" value="cold"><label>COLD</label>
            </label><br>
            <label>얼음의 양 
                <input type="range" min="0" max="10" step="2" value="2">
            </label><br>
            <label>추가 옵션 
                <input type="checkbox" name="option" value="shot"><label>샷 추가</label>
                <input type="checkbox" name="option" value="decaf" checked><label>디카페인</label>
                <input type="checkbox" name="option" value="almont milk"><label>아몬드 우유</label>
            </label><br>
            <label>주문 수량 
                <input type="number" min="0" max="10" step="2" value="2">
            </label>
        </fieldset>

        <fieldset>
            <legend>기타 요청 사항</legend>
            <label>요청 사항 <textarea cols="20" rows="3"></textarea></label><br>
            <label>쿠폰 코드 <input type="search"></label><br>
            <label>비밀번호(주문 확인용) <input type="password"></label>
        </fieldset>
        
        <!-- <input type="submit" value="주문하기">
        <input type="reset" value="취소하기"> -->

        <button type="submit">주문하기</button>
        <button type="reset">취소하기</button>

        <a href="web02_cafe.html" target="_blank"><button>이전 페이지로 돌아가기</button></a>
        <p>만일 수령한 상품에 문제가 있다면 즉시 반품을 신청해주세요<br>
        반품 신청시 상품의 상태를 사진으로 첨부해 주세요 <br>
        <input type="file"></p>
    </form>

    

</body>
</html>
